version: '3.8'

services:
  mysql_db:
    image: mysql:8.0
    container_name: todo_mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: todo_db
      MYSQL_USER: user_todo
      MYSQL_PASSWORD: todo_123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: